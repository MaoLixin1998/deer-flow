    <rect class="chrome" x="0" y="0" width="820" height="50" rx="16"/>
    <line class="line" x1="0" y1="50" x2="820" y2="50"/>
    <circle class="dot-red" cx="26" cy="25" r="6"/><circle class="dot-yellow" cx="48" cy="25" r="6"/><circle class="dot-green" cx="70" cy="25" r="6"/>
    <rect class="address" x="112" y="13" width="430" height="24" rx="12"/>
    <text class="muted tiny" x="132" y="30">localhost:2026/workbench?canvas=edit</text>
    <rect class="pane-soft" x="0" y="51" width="66" height="509"/>
    <line class="strong-line" x1="66" y1="51" x2="66" y2="560"/>
    <rect class="canvas" x="67" y="51" width="545" height="509"/>
    <line class="strong-line" x1="612" y1="51" x2="612" y2="560"/>
    <rect class="pane-soft" x="613" y="51" width="207" height="509"/>
    <text class="muted tiny" x="28" y="120">选</text><text class="muted tiny" x="28" y="170">裁</text><text class="muted tiny" x="28" y="220">绘</text>
    <rect class="asset" x="150" y="96" width="370" height="330" rx="24"/>
    <rect fill="none" stroke="#18181b" stroke-width="1.8" x="640" y="80" width="18" height="18" rx="3"/>
    <path class="icon-light" d="M644 86 h10 M644 92 h10"/>
    <text class="text label" x="668" y="94">图层 / 历史</text>
    <text class="muted tiny" x="640" y="140">主视觉</text>
    <text class="muted tiny" x="640" y="184">选区蒙版</text>
    <text class="muted tiny" x="640" y="228">文案组</text>
  </g>

  <!-- 06 Assets workflow -->
  <g transform="translate(916,1430)">
    <text class="text mid" x="0" y="-24">06 素材 / 工作流 / 导出</text>
    <rect class="browser shadow" x="0" y="0" width="820" height="560" rx="16"/>
    <rect class="chrome" x="0" y="0" width="820" height="50" rx="16"/>
    <line class="line" x1="0" y1="50" x2="820" y2="50"/>
    <circle class="dot-red" cx="26" cy="25" r="6"/><circle class="dot-yellow" cx="48" cy="25" r="6"/><circle class="dot-green" cx="70" cy="25" r="6"/>
    <rect class="address" x="112" y="13" width="430" height="24" rx="12"/>
    <text class="muted tiny" x="132" y="30">localhost:2026/workbench?panel=assets</text>
    <rect class="pane" x="0" y="51" width="560" height="509"/>
    <line class="strong-line" x1="560" y1="51" x2="560" y2="560"/>
    <rect class="pane-soft" x="561" y="51" width="259" height="509"/>
