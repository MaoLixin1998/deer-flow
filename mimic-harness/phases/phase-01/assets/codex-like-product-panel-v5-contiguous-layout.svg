    <text class="muted tiny" x="590" y="140">Plan  已完成</text>
    <text class="muted tiny" x="590" y="184">Image 已完成</text>
    <text class="muted tiny" x="590" y="228">HTML 待预览</text>
    <text class="muted tiny" x="590" y="272">导出  待确认</text>
    <rect class="pill" x="590" y="470" width="170" height="42" rx="16"/>
    <path class="icon-light" d="M620 482 h24 v18 h-24 z"/>
    <path class="icon-light" d="M632 478 v14"/>
    <path class="icon-light" d="M626 484 l6 -6 6 6"/>
    <text class="text tiny" x="654" y="496">打包导出</text>
  </g>

  <text class="muted small" x="64" y="2108">V5 验收：六张状态图都必须像浏览器窗口；输入框贴底部；左中右 Pane 顶满连续；右侧功能只放画板、素材、工作流、HTML、导出。</text>
</svg>
