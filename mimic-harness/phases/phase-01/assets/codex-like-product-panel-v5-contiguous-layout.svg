    <rect fill="none" stroke="#18181b" stroke-width="1.8" x="590" y="130" width="16" height="16" rx="3"/>
    <path class="icon-light" d="M594 142 l4 -4 3 3 2 -2 3 3"/>
    <text class="text tiny" x="618" y="143">画板</text>
    <rect fill="none" stroke="#8e8e93" stroke-width="1.7" x="590" y="178" width="18" height="14" rx="3"/>
    <path class="icon-light" d="M594 174 h18 v14"/>
    <text class="muted tiny" x="618" y="191">素材</text>
    <circle fill="none" stroke="#8e8e93" stroke-width="1.7" cx="598" cy="232" r="4"/>
    <circle fill="none" stroke="#8e8e93" stroke-width="1.7" cx="614" cy="232" r="4"/>
    <path class="icon-light" d="M602 232 h8"/>
    <text class="muted tiny" x="626" y="239">工作流</text>
    <path class="icon-light" d="M606 274 l-8 8 8 8"/>
    <path class="icon-light" d="M614 274 l8 8 -8 8"/>
    <text class="muted tiny" x="632" y="286">HTML</text>
    <path class="icon-light" d="M590 324 h28 v18 h-28 z"/>
    <path class="icon-light" d="M604 318 v16"/>
    <path class="icon-light" d="M598 324 l6 -6 6 6"/>
    <text class="muted tiny" x="630" y="334">导出</text>
  </g>

  <!-- 04 Canvas expanded -->
  <g transform="translate(916,790)">
    <text class="text mid" x="0" y="-24">04 画板展开：左 1/3 + 右画板</text>
    <rect class="browser shadow" x="0" y="0" width="820" height="560" rx="16"/>
    <rect class="chrome" x="0" y="0" width="820" height="50" rx="16"/>
    <line class="line" x1="0" y1="50" x2="820" y2="50"/>
    <circle class="dot-red" cx="26" cy="25" r="6"/><circle class="dot-yellow" cx="48" cy="25" r="6"/><circle class="dot-green" cx="70" cy="25" r="6"/>
    <rect class="address" x="112" y="13" width="430" height="24" rx="12"/>
    <text class="muted tiny" x="132" y="30">localhost:2026/workbench?canvas=open</text>
    <rect class="pane" x="0" y="51" width="268" height="509"/>
    <line class="strong-line" x1="268" y1="51" x2="268" y2="560"/>
    <rect class="canvas" x="269" y="51" width="551" height="509"/>
    <text class="text label" x="28" y="94">对话驱动画板</text>
    <rect class="pill" x="28" y="486" width="204" height="46" rx="18"/>
    <text class="muted tiny" x="46" y="514">重绘杯身气泡感...</text>
    <rect class="asset" x="344" y="110" width="340" height="340" rx="24"/>
    <text class="muted tiny" x="382" y="494">画板区域在浏览器内容区内顶满展开</text>
  </g>

