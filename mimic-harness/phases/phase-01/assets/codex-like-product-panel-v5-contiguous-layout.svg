    <text class="text mid" x="444" y="250">对话区保持稳定</text>
    <rect class="pill" x="382" y="486" width="330" height="46" rx="18"/>
  </g>

  <!-- 03 Right tool menu -->
  <g transform="translate(64,790)">
    <text class="text mid" x="0" y="-24">03 右侧产品工具展开</text>
    <rect class="browser shadow" x="0" y="0" width="820" height="560" rx="16"/>
    <rect class="chrome" x="0" y="0" width="820" height="50" rx="16"/>
    <line class="line" x1="0" y1="50" x2="820" y2="50"/>
    <circle class="dot-red" cx="26" cy="25" r="6"/><circle class="dot-yellow" cx="48" cy="25" r="6"/><circle class="dot-green" cx="70" cy="25" r="6"/>
    <rect class="address" x="112" y="13" width="430" height="24" rx="12"/>
    <text class="muted tiny" x="132" y="30">localhost:2026/workbench?panel=tools</text>
    <rect class="pane" x="0" y="51" width="560" height="509"/>
    <line class="strong-line" x1="560" y1="51" x2="560" y2="560"/>
    <rect class="pane-soft" x="561" y="51" width="259" height="509"/>
